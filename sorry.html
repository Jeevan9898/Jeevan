<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorry Message</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            font-family: Arial, sans-serif;
        }

        .card {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
        }

        .card h1 {
            color: #ff4d6d;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }

        .heart {
            font-size: 30px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>I'm Sorry 💔</h1>
        <p>
            Hey, I’m really sorry for what I did. I didn’t mean to hurt you, 
            but I understand that I did. You matter to me a lot, and I hope 
            you can forgive me.
        </p>
        <div class="heart">❤️</div>
    </div>

</body>
</html>
